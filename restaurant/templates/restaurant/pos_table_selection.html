<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POS — Select Order | Brothers Cafe</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;overflow-x:hidden}
:root{--red:#e74c3c;--dark:#1a1a2e;--mid:#0f3460;--green:#27ae60;--orange:#f39c12}

/* TOP BAR */
.topbar{background:rgba(0,0,0,.35);backdrop-filter:blur(12px);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.08)}
.tb-brand{font-size:18px;font-weight:800;color:white;display:flex;align-items:center;gap:10px}
.tb-brand small{font-size:11px;opacity:.45;font-weight:400;margin-left:4px}
.tb-right{display:flex;align-items:center;gap:12px}
#clk{font-size:13px;color:rgba(255,255,255,.5)}
.btn-link{color:rgba(255,255,255,.6);text-decoration:none;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.15);transition:.2s}
.btn-link:hover{background:rgba(255,255,255,.1);color:white}

/* PAGE BODY */
.page{padding:28px 24px 40px;max-width:1100px;margin:0 auto}
.section-title{color:rgba(255,255,255,.55);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;margin-top:32px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}
.section-title:first-of-type{margin-top:8px}

/* GRID */
.order-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:8px}
.tw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}

/* CARD */
.order-card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:16px;padding:16px 12px 14px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;text-decoration:none;display:block;color:white}
.order-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-color,#3498db);border-radius:16px 16px 0 0}
.order-card:hover{transform:translateY(-5px);border-color:rgba(255,255,255,.3);box-shadow:0 12px 32px rgba(0,0,0,.3)}
.order-card.occupied{border-color:rgba(231,76,60,.5);background:rgba(231,76,60,.08)}
.order-card.occupied::before{background:var(--red)}

/* STATUS BADGE */
.card-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase}
.badge-available{background:rgba(39,174,96,.2);color:#27ae60;border:1px solid rgba(39,174,96,.4)}
.badge-occupied{background:rgba(231,76,60,.2);color:#e74c3c;border:1px solid rgba(231,76,60,.4)}

/* CARD CONTENT */
.card-img{font-size:36px;margin-bottom:8px;line-height:1;display:block}
.card-img img{width:48px;height:48px;object-fit:cover;border-radius:10px;margin:0 auto 4px;display:block}
.card-num{font-size:15px;font-weight:800;margin-bottom:2px}
.card-sub{font-size:10px;color:rgba(255,255,255,.5);font-weight:500}
.card-items{font-size:10px;color:var(--red);font-weight:700;margin-top:4px}

/* TAKEAWAY CARD */
.tw-card{--card-color:var(--orange)}
.tw-card::before{background:var(--orange)}
.tw-card:hover{border-color:rgba(243,156,18,.4)}

/* LEGEND */
.legend{display:flex;gap:20px;margin-top:24px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:7px;color:rgba(255,255,255,.5);font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* QUICK STATS */
.stats-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.stat-chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 18px;display:flex;flex-direction:column;align-items:center;min-width:100px}
.stat-v{font-size:20px;font-weight:800;color:white}
.stat-l{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* FLOATING NEW ORDER */
.fab{position:fixed;bottom:28px;right:28px;background:linear-gradient(135deg,var(--red),#c0392b);color:white;border:none;border-radius:50px;padding:14px 24px;font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(231,76,60,.5);display:flex;align-items:center;gap:8px;z-index:50;transition:.2s}
.fab:hover{transform:scale(1.04);box-shadow:0 12px 32px rgba(231,76,60,.6)}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-brand">☕ Brothers Cafe <small>POS Selection</small></div>
  <div class="tb-right">
    <span id="clk"></span>
    <a href="/staff/" class="btn-link" style="background:var(--red);border-color:var(--red);color:white">&#x1F464; Staff Portal</a>
  </div>
</div>

<div class="page">
  <!-- Quick Stats -->
  <div class="stats-bar">
    <div class="stat-chip">
      <div class="stat-v" id="statActive">0</div>
      <div class="stat-l">Active Orders</div>
    </div>
    <div class="stat-chip">
      <div class="stat-v" id="statItems">0</div>
      <div class="stat-l">Total Items</div>
    </div>
    <div class="stat-chip">
      <div class="stat-v" id="statRev">₹0</div>
      <div class="stat-l">Pending Total</div>
    </div>
  </div>

  <!-- DINE-IN ORDERS -->
  <div class="section-title">🪑 Dine-In Tables — Order 1 to 15</div>
  <div class="order-grid" id="orderGrid"></div>

  <!-- TAKEAWAY -->
  <div class="section-title">🛍️ Takeaway Slots — TW 1 to 5</div>
  <div class="tw-grid" id="twGrid"></div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#3498db"></div> Available (Dine-In)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> Occupied</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> Takeaway</div>
  </div>
</div>


<script>
// ── STATE: read from localStorage (same as POS terminal) ──
var orders = {};
try {
  var saved = localStorage.getItem('pos_orders');
  if (saved) orders = JSON.parse(saved) || {};
} catch(e){}

// ── CLOCK ──
(function tick(){
  var d = new Date();
  document.getElementById('clk').textContent =
    d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
  setTimeout(tick, 10000);
})();

// ── RENDER DINE-IN GRID (Order 1–15) ──
function renderOrderGrid() {
  var g = document.getElementById('orderGrid');
  var html = '';
  for (var n = 1; n <= 15; n++) {
    var key = 'Order ' + n;
    var o = orders[key];
    var occupied = o && o.items && o.items.length > 0;
    var itemCount = occupied ? o.items.reduce(function(s,i){return s+i.qty;},0) : 0;
    var sub = occupied ? o.items.reduce(function(s,i){return s+i.price*i.qty;},0) : 0;
    var disc = occupied ? (o.disc||0) : 0;
    var tot = sub - sub*(disc/100);
    html += '<a href="javascript:void(0)" onclick="goToTerminal(\'' + key + '\')" '
      + 'class="order-card' + (occupied ? ' occupied' : '') + '" '
      + 'style="--card-color:' + (occupied ? '#e74c3c' : '#3498db') + '">'
      + '<span class="card-badge ' + (occupied ? 'badge-occupied' : 'badge-available') + '">'
      + (occupied ? 'Occupied' : 'Free') + '</span>'
      + '<div class="card-img">🪑</div>'
      + '<div class="card-num">Order ' + n + '</div>'
      + (occupied
        ? '<div class="card-sub">' + itemCount + ' item' + (itemCount!==1?'s':'') + '</div>'
          + '<div class="card-items">₹' + tot.toFixed(0) + '</div>'
        : '<div class="card-sub">Dine-In</div>')
      + '</a>';
  }
  g.innerHTML = html;
}

// ── RENDER TAKEAWAY GRID (TW 1–5) ──
function renderTWGrid() {
  var g = document.getElementById('twGrid');
  var html = '';
  for (var n = 1; n <= 5; n++) {
    var key = 'Takeaway ' + n;
    var o = orders[key];
    var occupied = o && o.items && o.items.length > 0;
    var itemCount = occupied ? o.items.reduce(function(s,i){return s+i.qty;},0) : 0;
    var sub = occupied ? o.items.reduce(function(s,i){return s+i.price*i.qty;},0) : 0;
    var disc = occupied ? (o.disc||0) : 0;
    var parcel = occupied && o.parcel ? o.parcel : 0;
    var tot = (sub - sub*(disc/100)) + parcel;
    html += '<a href="javascript:void(0)" onclick="goToTerminal(\'' + key + '\')" '
      + 'class="order-card tw-card' + (occupied ? ' occupied' : '') + '" '
      + 'style="--card-color:' + (occupied ? '#e74c3c' : '#f39c12') + '">'
      + '<span class="card-badge ' + (occupied ? 'badge-occupied' : 'badge-available') + '">'
      + (occupied ? 'Occupied' : 'Free') + '</span>'
      + '<div class="card-img">🛍️</div>'
      + '<div class="card-num">TW ' + n + '</div>'
      + (occupied
        ? '<div class="card-sub">' + itemCount + ' item' + (itemCount!==1?'s':'') + '</div>'
          + '<div class="card-items">₹' + tot.toFixed(0) + '</div>'
        : '<div class="card-sub">Takeaway</div>')
      + '</a>';
  }
  g.innerHTML = html;
}

// ── STATS ──
function renderStats() {
  var activeCount = 0, totalItems = 0, totalRev = 0;
  Object.keys(orders).forEach(function(k) {
    var o = orders[k];
    if (o && o.items && o.items.length > 0) {
      activeCount++;
      var sub = o.items.reduce(function(s,i){return s+i.price*i.qty;},0);
      var disc = o.disc || 0;
      var parcel = o.parcel || 0;
      totalRev += (sub - sub*(disc/100)) + parcel;
      totalItems += o.items.reduce(function(s,i){return s+i.qty;},0);
    }
  });
  document.getElementById('statActive').textContent = activeCount;
  document.getElementById('statItems').textContent = totalItems;
  document.getElementById('statRev').textContent = '₹' + totalRev.toFixed(0);
}

// ── NAVIGATE TO TERMINAL ──
function goToTerminal(orderKey) {
  if (orderKey) {
    sessionStorage.setItem('pos_select_key', orderKey);
  } else {
    sessionStorage.removeItem('pos_select_key');
  }
  window.location.href = '/pos/terminal/';
}

// ── INIT ──
renderOrderGrid();
renderTWGrid();
renderStats();
</script>
</body>
</html>
