<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Brothers Cafe{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f8f9fa; color: #333; }
        :root {
            --primary: #e74c3c;
            --primary-dark: #c0392b;
            --secondary: #2c3e50;
            --accent: #f39c12;
            --success: #27ae60;
            --light: #ecf0f1;
            --dark: #1a1a2e;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 24px; border: none; border-radius: 50px;
            cursor: pointer; font-family: 'Poppins', sans-serif;
            font-weight: 600; font-size: 14px; transition: all 0.3s;
            text-decoration: none;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 5px 20px rgba(231,76,60,0.4); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-warning { background: var(--accent); color: white; }
        .card {
            background: white; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden;
        }
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 600;
        }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-info { background: #d1ecf1; color: #0c5460; }
        .toast {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            background: #333; color: white; padding: 14px 20px;
            border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            display: none; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.show { display: block; }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--primary); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
<div id="toast" class="toast"></div>
{% block content %}{% endblock %}
<script>
function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
