{% extends 'restaurant/base.html' %}
{% block title %}Staff Login - Brothers Cafe{% endblock %}
{% block extra_css %}
<style>
body { background: linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-card { background: white; border-radius: 24px; padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-logo { text-align: center; margin-bottom: 30px; }
.login-icon { width: 80px; height: 80px; background: linear-gradient(135deg,#e74c3c,#c0392b); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 15px; }
h2 { color: #2c3e50; font-size: 22px; margin-bottom: 5px; }
.sub { color: #aaa; font-size: 13px; }
.form-group { margin-bottom: 18px; }
label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
input { width: 100%; padding: 13px 15px; border: 2px solid #e9ecef; border-radius: 12px; font-family: 'Poppins',sans-serif; font-size: 14px; }
input:focus { outline: none; border-color: #e74c3c; }
.login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg,#e74c3c,#c0392b); color: white; border: none; border-radius: 12px; font-family: 'Poppins',sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; }
.error-msg { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 10px; font-size: 13px; margin-bottom: 15px; }
</style>
{% endblock %}
{% block content %}
<div class="login-card">
    <div class="login-logo">
        <div class="login-icon">👨‍🍳</div>
        <h2>Staff Login</h2>
        <div class="sub">Brothers Cafe · Staff Portal</div>
    </div>
    {% if error %}<div class="error-msg">❌ {{ error }}</div>{% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required autofocus>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="login-btn">🔐 Login to Staff Portal</button>
    </form>
    <div style="text-align:center;margin-top:15px">
        <a href="/" style="color:#aaa;font-size:12px;text-decoration:none">← Back to Customer View</a>
    </div>
</div>
{% endblock %}
